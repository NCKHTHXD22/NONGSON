services:
  - type: web
    name: tienichoazalo
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: ZALO_OA_TOKEN
        sync: false
      - key: ZALO_REFRESH_TOKEN
        sync: false
      - key: ZALO_APP_ID
        sync: false
      - key: ZALO_APP_SECRET
        sync: false
      - key: IOCTC_BASE_URL
        sync: false
      - key: IOCTC_USERNAME
        sync: false
      - key: IOCTC_PASSWORD
        sync: false
      - key: DAWACO_EMAIL
        sync: false
      - key: DAWACO_PASSWORD
        sync: false
      - key: PUBLIC_URL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
